name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least-privilege token; actions pinned to commit SHAs (R-11 — mutable major
# tags are a supply-chain vector). Bump pins deliberately, with the tag noted.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        node: [22, 24]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: ${{ matrix.node }}
      - name: Fault-injection test suite
        run: node --test tests/*.test.mjs
      - name: Shell syntax
        run: |
          for f in scripts/*.sh scripts/watchdog/*.sh; do bash -n "$f"; done
      - name: Kit validator (self-check)
        run: bash scripts/validate-team.sh .
      - name: Context budget ratchet
        run: bash scripts/measure-context.sh .

  shellcheck:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: ShellCheck
        run: |
          sudo apt-get update -q && sudo apt-get install -y -q shellcheck
          shellcheck -S warning scripts/*.sh scripts/watchdog/*.sh

  secret-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
      # FULL-HISTORY scan (F-09): the gitleaks-action push handler scans only
      # the pushed commit(s) (--log-opts=-1), so "commit a secret, delete it in
      # the next commit" could end green while history keeps the secret.
      # --log-opts=--all covers every commit on every ref each run — which also
      # makes concurrency cancellation safe (the newest scan supersedes).
      # .gitleaksignore fingerprints are honored.
      # Digest-pinned image (R5-13 — mutable tags are a supply-chain vector,
      # same rule as the SHA-pinned actions above); read-only mount and no
      # network, since detect needs neither.
      - name: Gitleaks full-history scan
        run: |
          docker run --rm --network none -v "$PWD:/repo:ro" \
            ghcr.io/gitleaks/gitleaks:v8.30.1@sha256:c00b6bd0aeb3071cbcb79009cb16a60dd9e0a7c60e2be9ab65d25e6bc8abbb7f \
            detect --source /repo --log-opts=--all --redact -v

  # Single stable check name for a branch ruleset (R5-09): require 'ci-required'
  # instead of chasing matrix-expanded job names.
  ci-required:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [test, shellcheck, secret-scan]
    if: always()
    steps:
      - name: All required jobs green
        # Every dependency must be exactly 'success' (R6-12): needs.*.result
        # can also be 'skipped', which a failure/cancelled check reads as green
        # the moment any dependency gains a job-level condition.
        run: |
          [ "${{ needs.test.result }}" = "success" ]
          [ "${{ needs.shellcheck.result }}" = "success" ]
          [ "${{ needs.secret-scan.result }}" = "success" ]
