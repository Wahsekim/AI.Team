name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least-privilege token; actions pinned to commit SHAs (R-11 — mutable major
# tags are a supply-chain vector). Bump pins deliberately, with the tag noted.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        node: [22, 24]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: ${{ matrix.node }}
      - name: Fault-injection test suite
        run: node --test tests/*.test.mjs
      - name: Shell syntax
        run: |
          for f in scripts/*.sh scripts/watchdog/*.sh; do bash -n "$f"; done
      - name: Kit validator (self-check)
        run: bash scripts/validate-team.sh .
      - name: Context budget ratchet
        run: bash scripts/measure-context.sh .

  shellcheck:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: ShellCheck
        run: |
          sudo apt-get update -q && sudo apt-get install -y -q shellcheck
          shellcheck -S warning scripts/*.sh scripts/watchdog/*.sh

  secret-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
      - name: Gitleaks secret scan
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
